server:
  port: 8082

spring:
  application:
    name: user-service
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: 86400000 # 1 day

  # ✅ Configuración JDBC para Flyway (migraciones)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:busconnectdb}
    username: ${DB_USERNAME:busconnect_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # ✅ Flyway para migraciones automáticas
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: user_service

  # ✅ Configuración R2DBC (Reactiva)
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:busconnectdb}
    username: ${DB_USERNAME:busconnect_user}
    password: ${DB_PASSWORD}
    properties:
      schema: user_service
    pool:
      initial-size: 10
      max-size: 20
      max-idle-time: 30m
      validation-query: SELECT 1

  profiles:
    active: docker

  # ✅ Caché con Caffeine (in-memory, gratis)
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=1h
    cache-names:
      - users
      - sessions

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  default-produces-media-type: application/json
  default-consumes-media-type: application/json

# ✅ Logging para R2DBC
logging:
  level:
    '[com.busconnect.userservice]': DEBUG
    '[io.r2dbc.postgresql.QUERY]': DEBUG
    '[io.r2dbc.postgresql.PARAM]': DEBUG
    '[org.springframework.r2dbc]': DEBUG

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 30
    initial-instance-info-replication-interval-seconds: 40
    instance-info-replication-interval-seconds: 30
    eureka-service-url-poll-interval-seconds: 60
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

---
# Profile: prod (Render - sin Eureka, sin health indicators bloqueantes)
spring:
  config:
    activate:
      on-profile: prod
  cloud:
    discovery:
      enabled: false
  autoconfigure:
    exclude:
      - org.springframework.cloud.netflix.eureka.EurekaClientAutoConfiguration
      - org.springframework.cloud.netflix.eureka.EurekaDiscoveryClientConfiguration

eureka:
  client:
    enabled: false

management:
  health:
    defaults:
      enabled: true
    db:
      enabled: false
    r2dbc:
      enabled: false
