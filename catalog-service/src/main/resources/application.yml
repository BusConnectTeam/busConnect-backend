server:
  port: 8083

spring:
  application:
    name: catalog-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:busconnectdb}
    username: ${DB_USERNAME:busconnect_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        '[format_sql]': true
        '[default_schema]': catalog

  config:
    activate:
      on-profile: docker

  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

  profiles:
    active: docker

# OpenRouteService Configuration
openroute:
  api:
    key: ${OPENROUTE_API_KEY:}
    base-url: https://api.openrouteservice.org
    timeout: 10s
    max-requests-per-day: 2000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    '[com.busconnect.catalogservice]': DEBUG
    '[org.hibernate.SQL]': DEBUG
    '[org.hibernate.type.descriptor.sql.BasicBinder]': TRACE