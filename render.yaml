# Base de datos PostgreSQL gestionada por Render
databases:
  - name: busconnect-db
    plan: free
    region: frankfurt
    databaseName: busconnect
    user: postgres

services:
  # Eureka Service Discovery
  - type: pserv
    name: busconnect-eureka
    env: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./eureka-service/Dockerfile
    dockerContext: .
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: 8761

  # User Service
  - type: pserv
    name: busconnect-user-service
    env: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./user-service/Dockerfile
    dockerContext: .
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: 8082
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://busconnect-eureka:8761/eureka/
      - key: DB_HOST
        fromDatabase:
          name: busconnect-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: busconnect-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: busconnect-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: busconnect-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: busconnect-db
          property: password

  # Catalog Service
  - type: pserv
    name: busconnect-catalog-service
    env: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./catalog-service/Dockerfile
    dockerContext: .
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: 8083
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://busconnect-eureka:8761/eureka/
      - key: DB_HOST
        fromDatabase:
          name: busconnect-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: busconnect-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: busconnect-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: busconnect-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: busconnect-db
          property: password
      - key: OPENROUTESERVICE_API_KEY
        sync: false

  # API Gateway (Public)
  - type: web
    name: busconnect-api-gateway
    env: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: .
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: 8080
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://busconnect-eureka:8761/eureka/
    healthCheckPath: /actuator/health
