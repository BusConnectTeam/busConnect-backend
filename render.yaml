# Base de datos PostgreSQL gestionada por Render
databases:
  - name: busconnect-db
    plan: free
    region: frankfurt
    databaseName: busconnect

services:
  # User Service
  - type: web
    name: busconnect-user-service
    env: docker
    plan: free
    region: frankfurt
    autoDeploy: true
    dockerfilePath: ./user-service/Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: busconnect-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: busconnect-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: busconnect-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: busconnect-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: busconnect-db
          property: password

  # Catalog Service
  - type: web
    name: busconnect-catalog-service
    env: docker
    plan: free
    region: frankfurt
    autoDeploy: true
    dockerfilePath: ./catalog-service/Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: busconnect-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: busconnect-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: busconnect-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: busconnect-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: busconnect-db
          property: password
      - key: OPENROUTE_API_KEY
        sync: false

  # API Gateway (Public - punto de entrada)
  - type: web
    name: busconnect-api-gateway
    env: docker
    plan: free
    region: frankfurt
    autoDeploy: true
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: CATALOG_SERVICE_URL
        value: https://busconnect-catalog-service.onrender.com
      - key: USER_SERVICE_URL
        value: https://busconnect-user-service.onrender.com
